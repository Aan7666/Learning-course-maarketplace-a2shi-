<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button 
        defaultHref="/tabs-after-login/home" 
        mode="ios"
        [text]="''">
      </ion-back-button>
    </ion-buttons>
    <ion-title>Shopping Cart</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="cart-content">
  <div class="empty-cart-container">
    <div class="icon-circle">
      <ion-icon name="cart-outline"></ion-icon>
    </div>
    <h2>Your Cart is Empty</h2>
    <p>Add courses to your cart and continue your learning journey.</p>
  </div>
</ion-content>

<div class="bottom-action">
  <ion-button expand="block" class="explore-btn" routerLink="/tabs-after-login/search">
    Explore Courses
  </ion-button>
</div>
