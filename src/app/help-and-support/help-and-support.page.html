<ion-content [fullscreen]="true" class="help-support-content">
  <!-- Red Header Section -->
  <div class="red-header">
    <button class="back-btn" (click)="goBack()">
      <ion-icon name="chevron-back-outline"></ion-icon>
      <span>Back</span>
    </button>
    <h1 class="header-title">Help & Support</h1>
  </div>

  <!-- Main Container overlapping the header -->
  <div class="main-container">
    <div class="help-support-body">
      
      <!-- Content Card -->
      <div class="help-support-card animate-fade-in">
        <h3>Butuh Bantuan?</h3>
        <p>
          Hai! Kalau kamu mengalami kendala, menemukan bug, atau sekadar punya masukan untuk kami, jangan ragu untuk bercerita. Tim kami selalu siap membantu kamu!
        </p>
        
        <div class="divider-line"></div>
        
        <div class="email-contact-box">
          <p class="email-label">Silakan hubungi kami melalui email:</p>
          <a href="mailto:aishasupport@gmail.com" class="email-link">
            <ion-icon name="mail-outline" class="email-icon"></ion-icon>
            <span>aishasupport@gmail.com</span>
          </a>
        </div>
      </div>

    </div>
  </div>
</ion-content>
