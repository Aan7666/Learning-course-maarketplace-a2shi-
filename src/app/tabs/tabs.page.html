<ion-tabs (ionTabsDidChange)="tabChanged($event)">
  <ion-router-outlet [animated]="false"></ion-router-outlet>
  <ion-tab-bar slot="bottom">

    <ion-tab-button tab="home">
      <div class="icon-bubble">
        <ion-icon [name]="activeTab === 'home' ? 'home' : 'home-outline'"></ion-icon>
      </div>
      <ion-label>Home</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="courses">
      <div class="icon-bubble">
        <ion-icon [name]="activeTab === 'courses' ? 'play-circle' : 'play-circle-outline'"></ion-icon>
      </div>
      <ion-label>My Learning</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="search">
      <div class="icon-bubble">
        <ion-icon [name]="activeTab === 'search' ? 'search' : 'search-outline'"></ion-icon>
      </div>
      <ion-label>Search</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="wishlist">
      <div class="icon-bubble">
        <ion-icon [name]="activeTab === 'wishlist' ? 'heart' : 'heart-outline'"></ion-icon>
      </div>
      <ion-label>Wishlist</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile">
      <div class="icon-bubble">
        <ion-icon [name]="activeTab === 'profile' ? 'person-circle' : 'person-circle-outline'"></ion-icon>
      </div>
      <ion-label>Account</ion-label>
    </ion-tab-button>

  </ion-tab-bar>
</ion-tabs>

<!-- Tambah kondisi activeTab -->
<div class="signin-banner" *ngIf="!isLoggedIn && activeTab !== 'profile'">
  <span class="banner-text">Sign in to unlock the full potential of your learning journey.</span>
  <a class="banner-link" (click)="redirectToLogin()">SIGN IN</a>
</div>
