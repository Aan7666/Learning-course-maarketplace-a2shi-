<ion-content [fullscreen]="true">
  <!-- Red Header Section -->
  <div class="red-header">
     <div class="header-button filter-btn" [style.display]="isSelectionMode ? 'none' : 'flex'">
       <ion-icon name="funnel-outline"></ion-icon>
     </div>
    <h1 class="header-title">Wishlist</h1>
    <div class="header-button more-btn" id="more-menu-trigger" [style.display]="isSelectionMode ? 'none' : 'flex'">
      <ion-icon name="ellipsis-vertical"></ion-icon>
    </div>
    <div class="header-button cancel-btn" *ngIf="isSelectionMode" (click)="cancelSelection()">
      Cancel
    </div>
  </div>

  <!-- Popover Menu -->
  <ion-popover trigger="more-menu-trigger" dismissOnSelect="true" class="custom-popover">
    <ng-template>
      <ion-content class="popover-content">
        <ion-list class="popover-list" lines="none">
          <ion-item button detail="false" (click)="onSelectItems()" class="popover-item">
            <ion-icon name="checkbox-outline" slot="start" class="popover-icon"></ion-icon>
            <ion-label class="popover-label">Select Items</ion-label>
          </ion-item>
        </ion-list>
      </ion-content>
    </ng-template>
  </ion-popover>

  <!-- Main Container -->
  <div class="main-container">
    
    <!-- Wishlist Items List -->
    <div class="wishlist-list" *ngIf="wishlistItems.length > 0">
      <div 
        class="wishlist-card" 
        *ngFor="let item of wishlistItems" 
        [class.in-selection]="isSelectionMode"
        (click)="isSelectionMode ? toggleItemSelection(item) : null"
      >
        <!-- Selection Checkbox -->
        <div class="selection-checkbox" *ngIf="isSelectionMode">
          <div class="checkbox-circle" [class.checked]="item.selected">
            <ion-icon name="checkmark" *ngIf="item.selected"></ion-icon>
          </div>
        </div>

        <div class="card-img-placeholder">
          <ion-icon name="heart" class="heart-icon"></ion-icon>
        </div>
        
        <div class="card-body">
          <h3 class="course-title">{{ item.title }}</h3>
          <p class="course-instructor">{{ item.instructor }}</p>
          <p class="course-price">{{ item.price }}</p>
          
          <div class="card-meta-row">
            <span class="meta-students">
              <ion-icon name="people-outline"></ion-icon>
              {{ item.students }}
            </span>
            <span class="meta-rating">
              <ion-icon name="star"></ion-icon>
              {{ item.rating }}
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State Content -->
    <div class="empty-state" *ngIf="wishlistItems.length === 0">
      <div class="illustration-container">
        <!-- Desktop Computer (Left) -->
        <div class="icon-wrapper desktop-wrapper">
          <ion-icon name="desktop-outline" class="empty-icon"></ion-icon>
        </div>
        
        <!-- Medal (Center/Bottom) -->
        <div class="icon-wrapper medal-wrapper">
          <ion-icon name="medal-outline" class="empty-icon"></ion-icon>
        </div>
        
        <!-- Book (Right) -->
        <div class="icon-wrapper book-wrapper">
          <ion-icon name="book-outline" class="empty-icon"></ion-icon>
        </div>
      </div>

      <h2 class="empty-title">save your wishes here!</h2>
      <p class="empty-subtitle">your wish list will be saved here.</p>
    </div>


  </div>
</ion-content>

<!-- Bottom Action Bar (Select Items Footer) -->
<ion-footer class="ion-no-border wishlist-footer" *ngIf="isSelectionMode">
  <div class="selection-action-bar">
    <div class="select-all-container" (click)="toggleSelectAll()">
      <div class="checkbox-circle" [class.checked]="isAllSelected">
        <ion-icon name="checkmark" *ngIf="isAllSelected"></ion-icon>
      </div>
      <span class="select-all-text">All</span>
    </div>
    
    <div class="right-actions">
      <button class="delete-btn" (click)="deleteSelected()">
        <ion-icon name="trash"></ion-icon>
      </button>
    </div>
  </div>
</ion-footer>
