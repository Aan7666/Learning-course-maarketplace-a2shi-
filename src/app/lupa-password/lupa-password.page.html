<div class="forgot-wrapper">

  <!-- Close Button (X) -->
  <button type="button" class="btn-close" (click)="onClose()">
    <span class="material-symbols-outlined">close</span>
  </button>

  <!-- Decorative Wave / Curve Lines to match user's mockup -->
  <div class="bg-waves">
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="wave-svg">
      <!-- Curved light overlay path 1 -->
      <path d="M-20,30 C30,10 60,40 120,20 L120,-10 L-20,-10 Z" fill="rgba(255, 255, 255, 0.05)" />
      <!-- Curved light overlay path 2 -->
      <path d="M-10,50 C40,30 80,70 110,40" fill="none" stroke="rgba(255, 255, 255, 0.07)" stroke-width="0.3" />
      <!-- Circular wave rings -->
      <circle cx="90" cy="20" r="40" fill="none" stroke="rgba(255, 255, 255, 0.04)" stroke-width="0.2" />
      <circle cx="90" cy="20" r="55" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="0.2" />
      <circle cx="90" cy="20" r="70" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="0.15" />
      <!-- Left side soft curves -->
      <path d="M-30,100 C20,80 10,40 -20,0" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="0.3" />
      <path d="M-40,100 C30,75 20,35 -30,0" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="0.3" />
    </svg>
  </div>

  <!-- Background Mesh Ornaments -->
  <div class="mesh-overlay"></div>

  <!-- Brand Center Area -->
  <div class="brand-area animate-fade-in">
    <!-- Premium stylized SVG Logo representing A2SHI Academy -->
    <div class="logo-container">
      <svg class="brand-logo-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <!-- Elegant ribbon stylized A -->
        <path d="M 35,90 C 22,90 20,70 32,60 C 45,50 50,70 60,90 C 70,70 75,50 88,60 C 100,70 98,90 85,90" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
        <path d="M 60,90 C 50,70 42,40 52,24 C 54,20 58,16 62,18 C 66,20 68,26 62,34 C 56,42 45,50 35,62" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
        <!-- Upward Arrow integrated on right leg of the A -->
        <path d="M 58,21 L 76,21 M 76,21 L 70,30 M 76,21 L 67,15" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Stylized Open Book in the middle of the A -->
        <path d="M 46,65 C 52,61 58,63 60,67 C 62,63 68,61 74,65 L 72,77 C 67,73 62,75 60,79 C 58,75 53,73 48,77 Z" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    
    <span class="brand-title">A2SHI</span>
    <span class="brand-subtitle">ACADEMY</span>
    
    <p class="brand-tagline">Where Learning Meets Opportunity</p>
    <p class="brand-tagline-sub">Learn, Grow, Succeed!</p>
  </div>

  <!-- Main Bottom Card -->
  <main class="main-content">
    <div class="forgot-card animate-slide-up">
      
      <div class="card-header">
        <h1>Forgot Password</h1>
        <p>Enter your email to receive a password reset link.</p>
      </div>

      <form class="forgot-form" (ngSubmit)="onContinue()">
        
        <div class="input-label">Let's Reset Your Password</div>
        
        <div class="input-group">
          <!-- Mail Icon -->
          <span class="material-symbols-outlined input-icon">mail</span>
          <input 
            type="email" 
            [(ngModel)]="emailAddress" 
            name="emailAddress" 
            placeholder="Email Address" 
            class="custom-input" 
            required 
            autocomplete="email"
          />
        </div>

        <button type="submit" class="btn-primary">
          <span>Continue</span>
        </button>
      </form>

    </div>
  </main>
</div>
